<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Indovina l'Animale - Indizi Progressivi</title>
<style>
    /* Stile generale */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        padding: 20px;
        background-color: #98cefc;
        color: #333;
    }
    
    /* Titoli */
    h1 {
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        margin-bottom: 30px;
    }
    
    /* Contenitore hint e input */
    #game-container {
        background: rgba(255,255,255,0.9);
        padding: 25px 30px;
        border-radius: 15px;
        max-width: 500px;
        margin: 0 auto;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    
    /* Indizi */
    .hint {
        font-size: 1.2em;
        margin: 12px 0;
        color: #555;
    }
    
    /* Casella di input */
    input[type=text] {
        padding: 12px;
        width: 80%;
        font-size: 1em;
        border: 2px solid #ccc;
        border-radius: 10px;
        margin-top: 15px;
        transition: border-color 0.3s, box-shadow 0.3s;
    }
    input[type=text]:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 8px rgba(76,175,80,0.4);
        outline: none;
    }
    
    /* Pulsanti */
    button {
        padding: 12px 25px;
        font-size: 1em;
        cursor: pointer;
        margin: 10px 5px;
        border: none;
        border-radius: 10px;
        transition: transform 0.2s, background-color 0.2s;
    }
    #tryBtn { background-color: #4CAF50; color: white; }
    #nextHintBtn { background-color: #2196F3; color: white; }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    
    /* Messaggi di risultato */
    .result { font-size: 1.2em; margin-top: 20px; color: #4CAF50; }
    .result.error { color: #f44336; }
    
    /* Link home */
    a {
        display: inline-block;
        margin-bottom: 20px;
        color: #fff;
        text-decoration: none;
        font-weight: bold;
    }
    a:hover { text-decoration: underline; }
    
    /* Media queries per dispositivi mobili */
    @media (max-width: 480px) {
        #game-container { padding: 15px 20px; }
        input[type=text] { width: 95%; font-size: 0.95em; padding: 10px; }
        button { padding: 10px 18px; font-size: 0.95em; margin: 5px; }
        .hint { font-size: 1em; }
    }
    </style>

<body>

    <h1><a href="index.html">Torna alla Home</a></h1>
    <h1>Indovina l'Animale</h1>

<div id="game-container">
    <div id="hint"></div>
    <input type="text" id="guess" placeholder="Scrivi qui il tuo animale">
    <br>
    <button id="tryBtn">Prova a indovinare</button>
    <button id="nextHintBtn">Mostra un altro indizio</button>
    <div class="result" id="result"></div>
</div>

<script>
const animals = [
    {
        name: "Elefante",
        hints: [
            "Sono un mammifero molto grande.",
            "Ho quattro zampe massicce.",
            "Vivo in branchi in alcune zone.",
            "La mia pelle è spessa e grigia.",
            "Ho una lunga proboscide.",
            "Le mie zanne sono di avorio."
        ]
    },
    {
        name: "Leone",
        hints: [
            "Sono un predatore carnivoro.",
            "Appartengo alla famiglia dei felini.",
            "Vivo principalmente in Africa.",
            "Sono famoso per la mia forza.",
            "Il maschio ha una folta criniera.",
            "Sono chiamato il re della giungla."
        ]
    },
    {
        name: "Pinguino",
        hints: [
            "Sono un uccello che non può volare.",
            "Vivo in zone fredde dell'emisfero sud.",
            "Ho un corpo affusolato.",
            "Mi muovo goffamente sulla terraferma.",
            "Ho piume nere e bianche.",
            "Nuoto molto bene sott’acqua."
        ]
    }
];

let currentIndex = 0;
let currentHint = 0;

function showHint() {
    const hintDiv = document.getElementById('hint');
    if (currentHint < animals[currentIndex].hints.length) {
        hintDiv.innerHTML = `<p class="hint">Indizio ${currentHint+1}: ${animals[currentIndex].hints[currentHint]}</p>`;
    } else {
        hintDiv.innerHTML = `<p class="hint">Hai esaurito tutti gli indizi!</p>`;
    }
}

document.getElementById('nextHintBtn').addEventListener('click', () => {
    currentHint++;
    showHint();
    document.getElementById('result').textContent = '';
});

document.getElementById('tryBtn').addEventListener('click', () => {
    const userGuess = document.getElementById('guess').value.trim().toLowerCase();
    const correctAnswer = animals[currentIndex].name.toLowerCase();

    if(userGuess === correctAnswer) {
        document.getElementById('result').textContent = `Corretto! Era ${animals[currentIndex].name}.`;
        document.getElementById('result').className = 'result';
        currentIndex++;
        if(currentIndex < animals.length) {
            currentHint = 0;
            setTimeout(() => {
                document.getElementById('guess').value = '';
                showHint();
                document.getElementById('result').textContent = '';
            }, 1500);
        } else {
            setTimeout(() => {
                document.getElementById('game-container').innerHTML = `<h2>Hai completato tutti gli animali!</h2>`;
            }, 1500);
        }
    } else {
        document.getElementById('result').textContent = 'Sbagliato, riprova!';
        document.getElementById('result').className = 'result error';
    }
});

// Mostriamo il primo indizio
showHint();
</script>

</body>
</html>
