<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Quiz Animali</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #c3ecf7, #f3c4f3);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background 0.5s;
        }

        h1 a {
            text-decoration: none;
            color: #333;
            font-size: 1.2em;
        }

        h1 {
            margin-bottom: 20px;
            color: #222;
        }

        #quizzie {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            max-width: 700px;
            width: 90%;
            transition: all 0.3s;
        }

        .question {
            font-size: 1.4em;
            margin-bottom: 1.5em;
            font-weight: 500;
            color: #333;
            animation: fadeIn 0.5s ease-in-out;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .answer-btn {
            padding: 14px 20px;
            font-size: 1.15em;
            border-radius: 12px;
            border: 2px solid #ccc;
            background: #fff;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-weight: 500;
        }

        /* Animazione hover: leggero movimento e glow */
        .answer-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            transform: skewX(-20deg);
            transition: all 0.5s;
        }

        .answer-btn:hover::before {
            left: 100%;
        }

        .answer-btn:hover:not(:disabled) {
            background: #f0f0f0;
            border-color: #888;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .answer-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Colore corretto/sbagliato */
        .answer-btn.correct { background-color: #4CAF50; color: white; border-color: #4CAF50; }
        .answer-btn.wrong { background-color: #f44336; color: white; border-color: #f44336; }

        /* Animazioni generali */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media (max-width: 768px) {
            .question { font-size: 1.2em; }
            .answer-btn { font-size: 1em; padding: 12px 18px; }
        }

        @media (max-width: 480px) {
            .question { font-size: 1em; }
            .answer-btn { font-size: 0.95em; padding: 10px 14px; }
        }
    </style>
</head>
<body>

<h1><a href="index.html">Torna alla Home</a></h1>
<h1>Quiz Animali</h1>

<div id="quizzie"></div>

<script>

    { question: "Quale animale è famoso per le sue corna ricurve?", answers: ["Capra", "Cervo", "Bue", "Leone"], correct: "Capra" }

// Mischia le risposte
function shuffle(arr) {
    return arr.sort(() => 0.5 - Math.random());
}

// Prendi 6 domande casuali
function getRandomQuestions(arr, num) {
    return shuffle(arr).slice(0, num);
}

function buildQuiz(questions) {
    const quizDiv = document.getElementById('quizzie');
    let currentQuestion = 0;
    let score = 0;

    function showQuestion() {
        quizDiv.innerHTML = '';
        const q = questions[currentQuestion];
        const title = document.createElement('h2');
        title.textContent = `Domanda ${currentQuestion + 1} di ${questions.length}`;
        quizDiv.appendChild(title);

        const questionEl = document.createElement('div');
        questionEl.className = 'question';
        questionEl.textContent = q.question;
        quizDiv.appendChild(questionEl);

        const answersContainer = document.createElement('div');
        answersContainer.className = 'answers';

        shuffle(q.answers).forEach(answer => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.textContent = answer;

            btn.addEventListener('click', () => {
                if (answer === q.correct) btn.classList.add('correct');
                else {
                    btn.classList.add('wrong');
                    [...answersContainer.children].forEach(b => {
                        if (b.textContent === q.correct) b.classList.add('correct');
                    });
                }
                [...answersContainer.children].forEach(b => b.disabled = true);

                setTimeout(() => {
                    currentQuestion++;
                    if (currentQuestion < questions.length) showQuestion();
                    else quizDiv.innerHTML = `<h2>Quiz terminato!</h2>
                        <p>Il tuo punteggio: <strong>${score} / ${questions.length}</strong></p>
                        <button onclick="location.reload()">Gioca di nuovo</button>`;
                }, 1200);
                if(answer === q.correct) score++;
            });

            answersContainer.appendChild(btn);
        });

        quizDiv.appendChild(answersContainer);
    }

    showQuestion();
}

const selectedQuestions = getRandomQuestions(allQuestions, 6);
buildQuiz(selectedQuestions);
</script>

</body>
</html>
