<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Reazione Veloce</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(to right, #fbc2eb, #a6c1ee);
    padding: 20px;
    margin: 0;
}

a {
    color:white; 
    font-weight:bold;
    text-decoration: none;
}

h1 {
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    margin-bottom: 20px;
}

#game-container {
    position: relative;
    width: 500px;
    height: 400px;
    margin: 30px auto;
    background: rgba(255,255,255,0.8);
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

button#reactionBtn {
    position: absolute;
    padding: 15px 25px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
    display: none;
    transition: transform 0.2s, background-color 0.2s;
}

button#reactionBtn:hover {
    transform: scale(1.1);
}

#info {
    margin-top: 20px;
    font-size: 1.2em;
    color: #fff;
    text-shadow: 1px 1px 2px #000;
}

/* MEDIA QUERIES PER MOBILE */
@media (max-width: 768px) {
    #game-container {
        width: 90%;
        height: 300px;
    }

    button#reactionBtn {
        padding: 12px 20px;
        font-size: 1rem;
    }

    #info {
        font-size: 1rem;
    }

    h1 {
        font-size: 2rem;
    }
}

@media (max-width: 480px) {
    #game-container {
        width: 95%;
        height: 250px;
    }

    button#reactionBtn {
        padding: 10px 15px;
        font-size: 0.9rem;
    }

    #info {
        font-size: 0.9rem;
    }

    h1 {
        font-size: 1.6rem;
    }
}
</style>
</head>
<body>

    <h1><a href="index.html">Torna alla Home</a></h1>
    <h1>Reazione Veloce</h1>

<div id="game-container">
    <button id="reactionBtn">Cliccami!</button>
</div>

<div id="info">Clicca sul pulsante appena appare!</div>

<script>
const btn = document.getElementById('reactionBtn');
const info = document.getElementById('info');
let startTime, endTime;

function placeButton() {
    const container = document.getElementById('game-container');
    const x = Math.random() * (container.clientWidth - btn.clientWidth);
    const y = Math.random() * (container.clientHeight - btn.clientHeight);
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
}

function showButton() {
    const delay = Math.random() * 2000 + 1000;
    setTimeout(() => {
        placeButton();
        btn.style.display = 'block';
        startTime = performance.now();
    }, delay);
}

btn.addEventListener('click', () => {
    endTime = performance.now();
    const reaction = ((endTime - startTime)/1000).toFixed(3);
    info.textContent = `Tempo di reazione: ${reaction} secondi!`;
    btn.style.display = 'none';
    setTimeout(showButton, 2000);
});

showButton();
</script>

</body>
</html>
